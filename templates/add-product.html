<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Product</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <div class="page-shell">
    <div class="page-card">
      <div class="page-header page-header-with-link">
        <div>
          <h1>Add Product</h1>
          <p>Create a new product in PRODUCT_REGISTER.</p>
        </div>
        <a href="/" class="secondary-link">← Dashboard</a>
      </div>

      <form id="addProductForm" class="weight-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="product_name">Product Name</label>
            <input id="product_name" name="product_name" type="text" required />
          </div>

          <div class="form-group">
            <label for="product_category">Product Category</label>
            <select id="product_category" name="product_category" required>
              <option value="">Select</option>
              <option value="Vaccine">Vaccine</option>
              <option value="Dewormer">Dewormer</option>
              <option value="Antibiotic">Antibiotic</option>
              <option value="Vitamin">Vitamin</option>
              <option value="Iron">Iron</option>
              <option value="Supplement">Supplement</option>
              <option value="Topical">Topical</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="default_dose">Default Dose</label>
            <input id="default_dose" name="default_dose" type="number" step="0.01" />
          </div>

          <div class="form-group">
            <label for="dose_unit">Dose Unit</label>
            <input id="dose_unit" name="dose_unit" type="text" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="default_withdrawal_days">Default Withdrawal Days</label>
            <input id="default_withdrawal_days" name="default_withdrawal_days" type="number" step="1" />
          </div>

          <div class="form-group">
            <label for="supplier">Supplier</label>
            <input id="supplier" name="supplier" type="text" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Batch Tracking Required</label>
            <div class="radio-pill-group">
              <label class="radio-pill">
                <input type="radio" name="batch_tracking_required" value="Yes">
                <span>Yes</span>
              </label>
              <label class="radio-pill">
                <input type="radio" name="batch_tracking_required" value="No" checked>
                <span>No</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label>Is Active</label>
            <div class="radio-pill-group">
              <label class="radio-pill">
                <input type="radio" name="is_active" value="Yes" checked>
                <span>Yes</span>
              </label>
              <label class="radio-pill">
                <input type="radio" name="is_active" value="No">
                <span>No</span>
              </label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="product_notes">Product Notes</label>
          <textarea id="product_notes" name="product_notes"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit">Save Product</button>
        </div>

        <div id="add_product_message" class="message-box hidden"></div>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/addProduct.js') }}"></script>
</body>
</html>
