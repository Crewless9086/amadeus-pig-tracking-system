<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Pig</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <div class="page-shell">
    <div class="page-card">
      <div class="page-header page-header-with-link">
        <div>
          <h1>Add Pig</h1>
          <p>Create a new pig record in PIG_MASTER.</p>
        </div>
        <a href="/" class="secondary-link">← Dashboard</a>
      </div>

      <form id="addPigForm" class="weight-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="tag_number">Tag Number</label>
            <input id="tag_number" name="tag_number" type="text" required />
          </div>
          <div class="form-group">
            <label for="pig_name">Pig Name</label>
            <input id="pig_name" name="pig_name" type="text" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" required>
              <option value="">Select</option>
              <option value="Active">Active</option>
              <option value="Sold">Sold</option>
              <option value="Slaughtered">Slaughtered</option>
              <option value="Died">Died</option>
              <option value="Culled">Culled</option>
              <option value="Missing">Missing</option>
              <option value="Archived">Archived</option>
            </select>
          </div>

          <div class="form-group">
            <label>On Farm</label>
            <div class="radio-pill-group">
              <label class="radio-pill">
                <input type="radio" name="on_farm" value="Yes" checked>
                <span>Yes</span>
              </label>
              <label class="radio-pill">
                <input type="radio" name="on_farm" value="No">
                <span>No</span>
              </label>
            </div>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="animal_type">Animal Type</label>
            <select id="animal_type" name="animal_type" required>
              <option value="">Select</option>
              <option value="Piglet">Piglet</option>
              <option value="Weaner">Weaner</option>
              <option value="Grower">Grower</option>
              <option value="Finisher">Finisher</option>
              <option value="Gilt">Gilt</option>
              <option value="Sow">Sow</option>
              <option value="Boar">Boar</option>
            </select>
          </div>

          <div class="form-group">
            <label for="sex">Sex</label>
            <select id="sex" name="sex" required>
              <option value="">Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Castrated_Male">Castrated_Male</option>
              <option value="Unknown">Unknown</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="date_of_birth">Date of Birth</label>
            <input id="date_of_birth" name="date_of_birth" type="date" />
          </div>

          <div class="form-group">
            <label for="breed_type">Breed Type</label>
            <select id="breed_type" name="breed_type">
              <option value="">Select</option>
              <option value="Landrace">Landrace</option>
              <option value="Large White">Large White</option>
              <option value="Mix (LAN & LRG)">Mix (LAN & LRG)</option>
              <option value="Mix Landrace">Mix Landrace</option>
              <option value="Mix Large White">Mix Large White</option>
              <option value="Unknown">Unknown</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="colour_markings">Colour Markings</label>
            <input id="colour_markings" name="colour_markings" type="text" />
          </div>

          <div class="form-group">
            <label for="purpose">Purpose</label>
            <select id="purpose" name="purpose" required>
              <option value="">Select</option>
              <option value="Breeding">Breeding</option>
              <option value="Grow_Out">Grow_Out</option>
              <option value="Sale">Sale</option>
              <option value="Replacement">Replacement</option>
              <option value="House_Use">House_Use</option>
              <option value="Unknown">Unknown</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="source">Source</label>
            <select id="source" name="source" required>
              <option value="">Select</option>
              <option value="Born_On_Farm">Born_On_Farm</option>
              <option value="Bought_In">Bought_In</option>
              <option value="Transfer">Transfer</option>
              <option value="Unknown">Unknown</option>
            </select>
          </div>

          <div class="form-group">
            <label for="current_pen_id">Current Pen ID</label>
            <select id="current_pen_id" name="current_pen_id">
              <option value="">Select pen</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="litter_id">Litter ID</label>
            <input id="litter_id" name="litter_id" type="text" value="Unknown" />
          </div>

          <div class="form-group">
            <label for="birth_weight_kg">Birth Weight (kg)</label>
            <input id="birth_weight_kg" name="birth_weight_kg" type="number" step="0.01" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="mother">Mother</label>
            <select id="mother" name="mother">
              <option value="Unknown">Unknown</option>
            </select>
          </div>

          <div class="form-group">
            <label for="father">Father</label>
            <select id="father" name="father">
              <option value="Unknown">Unknown</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="acquisition_date">Acquisition Date</label>
            <input id="acquisition_date" name="acquisition_date" type="date" />
          </div>

          <div class="form-group">
            <label for="general_notes">General Notes</label>
            <input id="general_notes" name="general_notes" type="text" />
          </div>
        </div>

        <div class="form-actions">
          <button type="submit">Save Pig</button>
        </div>

        <div id="add_pig_message" class="message-box hidden"></div>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/addPig.js') }}"></script>
</body>
</html>
