<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <div class="page-shell orders-page-shell">
    <div class="page-card orders-page-card">
      <div class="page-header page-header-with-link">
        <div>
          <h1>Orders</h1>
          <p>Review active work, approvals, completed orders, and cancelled history.</p>
        </div>
        <div class="detail-actions compact-actions">
          <a href="/orders/new" class="button-link">Create New Order</a>
          <a href="/" class="button-link button-link-secondary">Dashboard</a>
        </div>
      </div>

      <div id="orders_summary" class="history-summary-grid"></div>

      <div id="orders_status_tabs" class="orders-status-tabs" role="tablist" aria-label="Order status views"></div>

      <div class="sales-filters-grid">
        <div class="form-group">
          <label for="orders_search">Search</label>
          <input type="text" id="orders_search" placeholder="Search order, customer, phone, notes..." />
        </div>

        <div class="form-group">
          <label for="orders_source_filter">Source</label>
          <select id="orders_source_filter">
            <option value="">All</option>
          </select>
        </div>

        <div class="form-group">
          <label for="orders_payment_filter">Payment Method</label>
          <select id="orders_payment_filter">
            <option value="">All</option>
          </select>
        </div>

        <div class="form-group">
          <label for="orders_location_filter">Collection Location</label>
          <select id="orders_location_filter">
            <option value="">All</option>
          </select>
        </div>
      </div>

      <div class="detail-actions compact-actions">
        <button type="button" id="clear_orders_filters_button" class="button-link button-link-secondary">
          Clear Filters
        </button>
      </div>

      <div id="orders_message" class="message-box hidden"></div>

      <div id="orders_list" class="pig-list-grid"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/orders.js') }}"></script>
</body>
</html>
