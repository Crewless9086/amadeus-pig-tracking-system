<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amadeus Pig Weights</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <div class="page-shell">
    <div class="page-card">
      <div class="page-header">
        <h1>Amadeus Pig Weight Capture</h1>
        <p>Select a pig, check the previous weight, enter the new weight, and save.</p>
      </div>

      <form id="pig-weight-form" class="weight-form">
        <div class="form-group">
          <label for="pig_id">Pig</label>
          <select id="pig_id" name="pig_id" required>
            <option value="">Loading pigs...</option>
          </select>
        </div>

        <div class="info-grid">
          <div class="info-card">
            <span class="info-title">Previous Weight</span>
            <span id="previous_weight" class="info-value">—</span>
          </div>

          <div class="info-card">
            <span class="info-title">Previous Weight Date</span>
            <span id="previous_weight_date" class="info-value">—</span>
          </div>

          <div class="info-card">
            <span class="info-title">Weight Difference</span>
            <span id="weight_difference" class="info-value">—</span>
          </div>

          <div class="info-card">
            <span class="info-title">Growth Rate</span>
            <span id="growth_rate" class="info-value">—</span>
          </div>

          <div class="info-card info-card-wide">
            <span class="info-title">Growth Status</span>
            <span id="growth_status" class="info-value">—</span>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="weight_date">Weight Date</label>
            <input type="date" id="weight_date" name="weight_date" required />
          </div>

          <div class="form-group">
            <label for="weight_kg">New Weight (kg)</label>
            <input type="number" step="0.01" id="weight_kg" name="weight_kg" required />
          </div>
        </div>

        <div class="form-group">
          <label for="condition_notes">Condition Notes</label>
          <textarea
            id="condition_notes"
            name="condition_notes"
            rows="4"
            placeholder="Optional notes..."
          ></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit_button">Save Weight</button>
        </div>

        <div id="message_box" class="message-box hidden"></div>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/pigWeights.form.js') }}"></script>
</body>
</html>
