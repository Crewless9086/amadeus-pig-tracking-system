<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Litter</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <div class="page-shell">
    <div class="page-card">
      <div class="page-header page-header-with-link">
        <div>
          <h1>Add Litter</h1>
          <p>Create a new litter record in LITTERS.</p>
        </div>
        <a href="/" class="secondary-link">← Dashboard</a>
      </div>

      <form id="addLitterForm" class="weight-form">
        <div class="form-group">
          <label for="mating_id">Select Mating (Optional)</label>
          <select id="mating_id" name="mating_id">
            <option value="">Manual Entry</option>
          </select>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="mother_pig_id">Mother</label>
            <select id="mother_pig_id" name="mother_pig_id" required>
              <option value="">Select mother</option>
            </select>
          </div>

          <div class="form-group">
            <label for="father_pig_id">Father</label>
            <select id="father_pig_id" name="father_pig_id">
              <option value="">Unknown</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="farrowing_date">Farrowing Date</label>
            <input id="farrowing_date" name="farrowing_date" type="date" required />
          </div>

          <div class="form-group">
            <label for="wean_date">Wean Date</label>
            <input id="wean_date" name="wean_date" type="date" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="total_born">Total Born</label>
            <input id="total_born" name="total_born" type="number" step="1" />
          </div>

          <div class="form-group">
            <label for="born_alive">Born Alive</label>
            <input id="born_alive" name="born_alive" type="number" step="1" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="stillborn_count">Stillborn Count</label>
            <input id="stillborn_count" name="stillborn_count" type="number" step="1" />
          </div>

          <div class="form-group">
            <label for="mummified_count">Mummified Count</label>
            <input id="mummified_count" name="mummified_count" type="number" step="1" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="male_count">Male Count</label>
            <input id="male_count" name="male_count" type="number" step="1" />
          </div>

          <div class="form-group">
            <label for="female_count">Female Count</label>
            <input id="female_count" name="female_count" type="number" step="1" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="fostered_in_count">Fostered In Count</label>
            <input id="fostered_in_count" name="fostered_in_count" type="number" step="1" />
          </div>

          <div class="form-group">
            <label for="fostered_out_count">Fostered Out Count</label>
            <input id="fostered_out_count" name="fostered_out_count" type="number" step="1" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="weaned_count">Weaned Count</label>
            <input id="weaned_count" name="weaned_count" type="number" step="1" />
          </div>

          <div class="form-group">
            <label for="average_wean_weight_kg">Average Wean Weight (kg)</label>
            <input id="average_wean_weight_kg" name="average_wean_weight_kg" type="number" step="0.01" />
          </div>
        </div>

        <div class="form-group">
          <label for="notes">Litter Notes</label>
          <textarea id="notes" name="notes"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit">Save Litter</button>
        </div>

        <div id="add_litter_message" class="message-box hidden"></div>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/addLitter.js') }}"></script>
</body>
</html>
