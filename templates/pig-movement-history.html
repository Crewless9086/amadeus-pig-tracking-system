<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amadeus Movement History</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <div class="page-shell">
    <div class="page-card">
      <div class="page-header page-header-with-link">
        <div>
          <h1 id="movement_history_title">Movement History</h1>
          <p id="movement_history_subtitle">Loading movement history...</p>
        </div>
        <a href="/pigs" class="secondary-link">← Back to Pig List</a>
      </div>

      <div class="detail-actions">
        <a id="movement_history_profile_button" href="#" class="button-link button-link-secondary">Back to Pig Profile</a>
        <a id="movement_history_record_button" href="#" class="button-link">Record Movement</a>
      </div>

      <div id="movement_history_message" class="message-box hidden"></div>

      <div id="movement_history_summary" class="history-summary-grid"></div>
      <div id="movement_history_list" class="history-list"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/pigMovementHistory.js') }}"></script>
</body>
</html>
