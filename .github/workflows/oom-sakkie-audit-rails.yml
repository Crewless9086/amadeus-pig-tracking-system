name: Oom Sakkie Audit Rails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  audit-rails:
    name: Unit tests with disposable Postgres audit rails
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amadeus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amadeus_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/amadeus_test
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Apply Oom Sakkie audit migrations
        run: |
          python scripts/apply_supabase_migration.py supabase/migrations/202606060001_create_oom_sakkie_traces.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606060002_create_oom_sakkie_trace_feedback.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606060003_add_oom_sakkie_safety_notes.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606060004_lock_oom_sakkie_trace_append_only.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606070001_create_oom_sakkie_build_requests.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606070002_create_oom_sakkie_build_request_events.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606070003_create_oom_sakkie_patch_proposals.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606070004_create_oom_sakkie_deploy_decisions.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606080001_create_oom_sakkie_agent_dry_runs.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606080002_create_oom_sakkie_agent_dry_run_results.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606090001_create_oom_sakkie_dispatch_decisions.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606090002_create_oom_sakkie_dispatch_execution_approvals.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606090003_allow_single_shot_sentinel_dry_run_results.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606100001_create_oom_sakkie_learning_influence_proposals.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606110001_create_oom_sakkie_learning_influence_consumption_audit_rail.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606140001_create_oom_sakkie_sales_campaigns.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606140002_create_oom_sakkie_sales_leads.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606160001_allow_sales_lead_owner_money_path_approval.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606160002_allow_sales_lead_customer_followup_send_events.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606160003_allow_sales_lead_booking_order_events.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606160004_allow_sam_meat_autoreply_events.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606160005_create_meat_price_book.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606160006_create_meat_ops_rails.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606160007_create_meat_instruction_events.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606160008_create_meat_fulfillment_events.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606160009_create_meat_journey_notification_events.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606170001_create_meat_reservation_events.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606170002_extend_meat_deposit_event_types.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606170003_create_meat_reconciliation_events.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606180001_create_meat_sales_conversation_learning_events.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606180002_create_beacon_media_library.sql
          python scripts/apply_supabase_migration.py supabase/migrations/202606180003_create_beacon_manual_post_events.sql

      - name: Run Oom Sakkie audit-rail suite with live checks enabled
        run: python -m unittest tests.test_oom_sakkie_service tests.test_oom_sakkie_routes tests.test_frontend_route_contracts tests.test_sales_transaction_routes tests.test_sam_meat_runtime tests.test_meat_price_book tests.test_meat_match_engine tests.test_meat_ops tests.test_meat_fulfillment tests.test_meat_reconciliation tests.test_sales_conversation_learning tests.test_beacon_media_library tests.test_beacon_campaign

      - name: Check Oom Sakkie JavaScript syntax
        run: |
          node --check static/js/oomSakkie.js
          node --check static/js/meatSalesLeads.js
          node --check static/js/meatDriver.js
          node --check static/js/beaconMedia.js

      - name: Run Oom Sakkie browser behavior smoke
        run: node tests/oom_sakkie_browser_behavior_smoke.js
